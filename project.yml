name: Tokenomics
options:
  bundleIdPrefix: com.robstout
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
schemes:
  Tokenomics:
    build:
      targets:
        Tokenomics: all
        TokenomicsTests: [test]
    run:
      config: Debug
    archive:
      config: Release
    test:
      config: Debug
      targets:
        - name: TokenomicsTests
          parallelizable: true
          randomExecutionOrder: true

  TokenomicsIntegration:
    build:
      targets:
        Tokenomics: all
        TokenomicsIntegrationTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: TokenomicsIntegrationTests
          parallelizable: false
          randomExecutionOrder: false
targets:
  Tokenomics:
    type: application
    platform: macOS
    dependencies:
      - package: Sparkle
        product: Sparkle
      - target: TokenomicsWidgets
        embed: true
    preBuildScripts:
      - name: "Fetch embedded Node.js"
        script: |
          # Download Node.js LTS arm64 if not already present.
          # Idempotent: skip when the right version is already installed.
          set -euo pipefail
          SCRIPT="${SRCROOT}/scripts/fetch-node.sh"
          if [ -f "$SCRIPT" ]; then
            bash "$SCRIPT"
          else
            echo "warning: fetch-node.sh not found — skipping embedded Node download."
          fi
        basedOnDependencyAnalysis: false
        showEnvVars: false
    postBuildScripts:
      - name: "Copy and codesign embedded Node.js"
        script: |
          # Copy the embedded-node directory from the source tree into the built
          # app bundle, then sign the node binary with the app's code-signing identity.
          #
          # Why a script instead of a resource reference in project.yml:
          # The embedded-node directory is downloaded at pre-build time and lives in
          # .gitignore. Xcode can't reference a directory that doesn't exist at
          # project-generation time, so we copy it ourselves here.
          set -euo pipefail

          SRC="${SRCROOT}/Tokenomics/Resources/embedded-node"
          DEST="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/embedded-node"
          NODE_BIN="${DEST}/bin/node"

          if [ ! -d "$SRC" ]; then
            echo "note: embedded-node source directory not found at ${SRC} — skipping."
            echo "      Run scripts/fetch-node.sh to download Node.js for Guided-mode connectors."
            exit 0
          fi

          # Sync into the bundle (rsync is faster than rm+cp on incremental builds)
          rsync -a --delete "$SRC/" "$DEST/"

          # Sign the node Mach-O binary.
          # --force: re-signs on incremental builds without needing to delete first.
          # --options runtime: enables the hardened runtime required for Apple notarization.
          if [ -f "$NODE_BIN" ]; then
            codesign --force --options runtime \
              --sign "${EXPANDED_CODE_SIGN_IDENTITY}" \
              "$NODE_BIN"
            echo "Signed embedded Node.js binary."
          fi
        basedOnDependencyAnalysis: false
        showEnvVars: false
    sources:
      - path: Tokenomics
        excludes:
          - Resources
      - path: Tokenomics/Resources/Assets.xcassets
        buildPhase: resources
      - path: Tokenomics/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: Tokenomics/Resources/Provider Icons/PNG/1x
        buildPhase: resources
      - path: Tokenomics/Resources/Provider Icons/PNG/2x
        buildPhase: resources
      - path: TokenomicsWidgets/TokenomicsWidgetEntryView.swift
        type: file
      - path: TokenomicsWidgets/WidgetIntent.swift
        type: file
      - path: TokenomicsWidgets/TokenomicsWidgets.swift
        type: file
    info:
      path: Tokenomics/Resources/Info.plist
      properties:
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "2.9.0-beta.1"
        CFBundleVersion: "48"
        LSUIElement: true
        CFBundleURLTypes:
          - CFBundleURLName: com.robstout.tokenomics
            CFBundleURLSchemes:
              - tokenomics
        SUFeedURL: https://raw.githubusercontent.com/rob-stout/Tokenomics/main/appcast.xml
        SUPublicEDKey: iykVNFpnZUJU85Quy7sBGwDg9zJHawXUt2OX6FxdyjE=
        SUEnableAutomaticChecks: true
    entitlements:
      path: Tokenomics/Resources/Tokenomics.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.com.robstout.tokenomics
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.robstout.tokenomics
        PRODUCT_NAME: Tokenomics
        INFOPLIST_FILE: Tokenomics/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Tokenomics/Resources/Tokenomics.entitlements
        ENABLE_APP_SANDBOX: NO
        SWIFT_STRICT_CONCURRENCY: complete
      configs:
        debug:
          # Program team for App Group support in debug builds
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: RPDDQP7KZ5
          CODE_SIGN_IDENTITY: "Apple Development"
        release:
          # Manual signing for Developer ID distribution
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: RPDDQP7KZ5
          CODE_SIGN_IDENTITY: "Developer ID Application"
          PROVISIONING_PROFILE_SPECIFIER: "Tokenomics Developer ID"

  TokenomicsWidgets:
    type: extensionkit-extension
    platform: macOS
    deploymentTarget:
      macOS: "14.0"
    sources:
      - path: TokenomicsWidgets
      - path: Tokenomics/Services/WidgetDataStore.swift
        type: file
      - path: Tokenomics/Resources/Provider Icons/PNG/1x
        buildPhase: resources
      - path: Tokenomics/Resources/Provider Icons/PNG/2x
        buildPhase: resources
    info:
      path: TokenomicsWidgets/Info.plist
      properties:
        CFBundleDisplayName: Tokenomics Widgets
        CFBundleShortVersionString: "2.9.0-beta.1"
        CFBundleVersion: "48"
        EXAppExtensionAttributes:
          EXExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: TokenomicsWidgets/TokenomicsWidgets.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.robstout.tokenomics
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.robstout.tokenomics.widgets
        PRODUCT_NAME: TokenomicsWidgets
        CODE_SIGN_ENTITLEMENTS: TokenomicsWidgets/TokenomicsWidgets.entitlements
        SWIFT_STRICT_CONCURRENCY: complete
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) WIDGET_EXTENSION"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
      configs:
        debug:
          # Program team for App Group support in debug builds
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: RPDDQP7KZ5
          CODE_SIGN_IDENTITY: "Apple Development"
        release:
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: RPDDQP7KZ5
          CODE_SIGN_IDENTITY: "Developer ID Application"
          PROVISIONING_PROFILE_SPECIFIER: "Tokenomics Widget Developer ID"

  TokenomicsTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget:
      macOS: "14.0"
    sources:
      - path: TokenomicsTests
        excludes:
          - Fixtures
      - path: TokenomicsTests/Fixtures
        buildPhase: resources
    dependencies:
      - target: Tokenomics
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.robstout.tokenomics.tests
        PRODUCT_NAME: TokenomicsTests
        SWIFT_STRICT_CONCURRENCY: complete
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
      configs:
        debug:
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: RPDDQP7KZ5

  TokenomicsIntegrationTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget:
      macOS: "14.0"
    sources:
      - path: TokenomicsIntegrationTests
    dependencies:
      - target: Tokenomics
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.robstout.tokenomics.integration-tests
        PRODUCT_NAME: TokenomicsIntegrationTests
        SWIFT_STRICT_CONCURRENCY: complete
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
      configs:
        debug:
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: RPDDQP7KZ5
